<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="always">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="stream" allowfullscreen webkitallowfullscreen mozallowfullscreen
    oallowfullscreen msallowfullscreen frameborder="0"
    allow="autoplay; fullscreen; encrypted-media" allowautoplay="true"
    allow-scripts="" scrolling="no"></iframe>
  <script>
    // Support URL param: /stream-proxy.html?url=ENCODED_URL
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    if (url) document.getElementById('stream').src = decodeURIComponent(url);
    // Also support postMessage from parent frame
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'SET_STREAM_URL') {
        document.getElementById('stream').src = e.data.url;
      }
    });
  </script>
</body>
</html>
